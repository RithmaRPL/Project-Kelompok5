<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biodata Pribadi</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');
      
      body {
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #2c3e50, #3498db);
        color: #fff;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      .container {
        max-width: 600px;
        margin: 20px;
        background: rgba(255, 255, 255, 0.1);
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(10px);
        animation: fadeIn 1s ease-out;
      }
      
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      .foto {
        text-align: center;
        margin-bottom: 25px;
      }
      
      .foto img {
        width: 180px;
        height: 180px;
        border-radius: 50%;
        border: 4px solid #fff;
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        transition: transform 0.3s ease;
      }
      
      .foto img:hover {
        transform: scale(1.05);
      }
      
      h1 {
        text-align: center;
        margin-bottom: 30px;
        font-size: 2.2em;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        position: relative;
      }
      
      h1::after {
        content: '';
        display: block;
        width: 60px;
        height: 3px;
        background: #ffd700;
        margin: 10px auto;
        border-radius: 2px;
      }
      
      .biodata {
        line-height: 2;
        font-size: 16px;
        padding: 0 20px;
      }
      
      .biodata p {
        margin: 15px 0;
        padding: 10px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.05);
        transition: transform 0.3s ease;
      }
      
      .biodata p:hover {
        transform: translateX(10px);
        background: rgba(255, 255, 255, 0.1);
      }
      
      .biodata span {
        font-weight: 600;
        color: #ffd700;
        margin-right: 10px;
        display: inline-block;
        min-width: 120px;
      }
      
      @media (max-width: 480px) {
        .container {
          margin: 10px;
          padding: 20px;
        }
        
        .foto img {
          width: 150px;
          height: 150px;
        }
        
        h1 {
          font-size: 1.8em;
        }
        
        .biodata {
          font-size: 14px;
          padding: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="foto">
        <img src="../assets/kamal.jpeg" alt="Foto Profil" />
      </div>
      <h1>Biodata Pribadi</h1>
      <div class="biodata">
        <p><span>Nama</span> Moch Kamal</p>
        <p><span>Tempat, Tanggal Lahir</span> Garut, 01 Maret 2009</p>
        <p><span>Alamat</span> Perum Pesona Intan, Garut</p>
        <p><span>Email</span> mkmalabdulkarim@gmail.com</p>
        <p><span>Telepon</span> 082262856062</p>
        <p><span>Hobi</span> Berenang</p>
        <p><span>Cita-cita</span> Sukses Dunia Akhirat</p>
        <p><span>Motto</span> "Docum Voletem Fata. Nolentem Trahunt"</p>
      </div>
    </div>
  </body>
</html>
